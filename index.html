<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Football Match Tracker</title>
  <style>
    body { font-family: system-ui, sans-serif; background: #0b132b; color: #fff; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
    .card { background: #1c2541; padding: 24px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,.4); width: 340px; text-align: center; }
    .hidden { display: none !important; }
    input, button { width: 100%; padding: 10px; margin-top: 8px; border-radius: 6px; border: 1px solid #3a506b; box-sizing: border-box; }
    input { background: #0b132b; color: #fff; outline: none; }
    button { background: #48cae4; border: none; font-weight: bold; cursor: pointer; color: #0b132b; }
    button:hover { background: #90e0ef; }
    .btn-alt { background: transparent; color: #cbd5e1; border: none; font-size: 12px; }
    .error { color: #ff4d4d; font-size: 13px; margin-top: 8px; }
    .flex-row { display: flex; gap: 8px; }
    .scoreboard { display: flex; justify-content: space-between; align-items: center; background: #0b132b; padding: 12px; border-radius: 8px; margin-top: 12px; }
    .team { display: flex; flex-direction: column; align-items: center; width: 80px; font-size: 12px; }
    .badge { width: 40px; height: 40px; object-fit: contain; }
    .score { font-size: 24px; font-weight: bold; }
    .meta { display: flex; justify-content: space-between; margin-top: 15px; font-size: 12px; color: #cbd5e1; border-top: 1px solid #3a506b; padding-top: 10px; }
  </style>
</head>
<body>

  <!-- PAGE 1: AUTHENTICATION -->
  <div id="authPage" class="card">
    <h2 id="authTitle">Sign In</h2>
    <input type="email" id="email" placeholder="Email">
    <input type="password" id="pass" placeholder="Password">
    <button id="authBtn">Sign In</button>
    <button id="toggleAuth" class="btn-alt">Need an account? Register</button>
    <button id="guestBtn" class="btn-alt" style="margin-top:10px; color:#48cae4;">Skip as Guest →</button>
    <div id="authErr" class="error hidden"></div>
  </div>

  <!-- PAGE 2: TRACKER APP -->
  <div id="trackerPage" class="card hidden">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
      <span id="userDisp" style="font-size:11px; color:#cbd5e1;">Guest</span>
      <button id="logoutBtn" style="width:auto; padding:4px 8px; font-size:11px; background:#ff4d4d; color:#fff;">Logout</button>
    </div>
    <h2 style="margin:0 0 12px;">⚽ Match Tracker</h2>
    
    <div class="flex-row">
      <input type="text" id="teamInput" value="Arsenal" style="margin:0;">
      <button id="searchBtn" style="width: auto;">Search</button>
    </div>

    <div id="loader" class="hidden" style="margin-top:10px;">Searching...</div>
    <div id="trackErr" class="error hidden"></div>

    <div id="matchDisplay" class="hidden">
      <div id="league" style="color:#48cae4; font-size:11px; font-weight:bold; margin-top:12px;">LEAGUE</div>
      <div class="scoreboard">
        <div class="team"><img id="hBadge" class="badge"> <span id="hName">Home</span></div>
        <div style="text-align:center;"><div id="score" class="score">0 - 0</div><span id="status" style="font-size:9px; background:#3a506b; padding:2px 4px; border-radius:3px;">FINISHED</span></div>
        <div class="team"><img id="aBadge" class="badge"> <span id="aName">Away</span></div>
      </div>
      <div class="meta">
        <div>Date: <strong id="mDate">--</strong></div>
        <div>Venue: <strong id="mVenue">--</strong></div>
      </div>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    const firebaseConfig = { apiKey: "YOUR_KEY", authDomain: "YOUR_PROJECT.firebaseapp.com", projectId: "YOUR_PROJECT" };
    const auth = getAuth(initializeApp(firebaseConfig));

    const $ = id => document.getElementById(id);
    const BADGE = 'data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="%233a506b" stroke-width="2"><circle cx="12" cy="12" r="10"/></svg>';
    let isSignUp = false;

    // --- NAVIGATION & AUTH ---
    const showPage = isApp => {
      $('authPage').classList.toggle('hidden', isApp);
      $('trackerPage').classList.toggle('hidden', !isApp);
    };

    $('toggleAuth').onclick = () => {
      isSignUp = !isSignUp;
      $('authTitle').textContent = $('authBtn').textContent = isSignUp ? 'Register' : 'Sign In';
      $('toggleAuth').textContent = isSignUp ? 'Already have an account? Sign In' : 'Need an account? Register';
    };

    $('authBtn').onclick = async () => {
      try {
        const action = isSignUp ? createUserWithEmailAndPassword : signInWithEmailAndPassword;
        await action(auth, $('email').value.trim(), $('pass').value);
      } catch (err) { $('authErr').textContent = err.message; $('authErr').classList.remove('hidden'); }
    };

    $('guestBtn').onclick = () => showPage(true);
    $('logoutBtn').onclick = () => signOut(auth);

    onAuthStateChanged(auth, user => {
      showPage(!!user);
      $('userDisp').textContent = user ? user.email : 'Guest';
    });

    // --- FOOTBALL API ---
    async function api(path) {
      const res = await fetch(`https://www.thesportsdb.com/api/v1/json/3/${path}`);
      return res.json();
    }

    async function searchMatch() {
      const q = $('teamInput').value.trim();
      if (!q) return;

      $('loader').classList.remove('hidden');
      $('trackErr').classList.add('hidden');
      $('matchDisplay').classList.add('hidden');

      try {
        const tData = await api(`searchteams.php?t=${encodeURIComponent(q)}`);
        if (!tData.teams) throw new Error('Team not found');
        
        const mData = await api(`eventslast.php?id=${tData.teams[0].idTeam}`);
        if (!mData.results) throw new Error('No recent matches');
        const m = mData.results[0];

        const [h, a] = await Promise.allSettled([api(`lookupteam.php?id=${m.idHomeTeam}`), api(`lookupteam.php?id=${m.idAwayTeam}`)]);

        $('league').textContent = m.strLeague || 'Match';
        $('hName').textContent = m.strHomeTeam;
        $('aName').textContent = m.strAwayTeam;
        $('hBadge').src = h.status === 'fulfilled' && h.value.teams ? h.value.teams[0].strBadge : BADGE;
        $('aBadge').src = a.status === 'fulfilled' && a.value.teams ? a.value.teams[0].strBadge : BADGE;
        $('score').textContent = `${m.intHomeScore ?? '-'} - ${m.intAwayScore ?? '-'}`;
        $('status').textContent = m.strStatus || 'FINISHED';
        $('mDate').textContent = m.dateEvent || '--';
        $('mVenue').textContent = m.strVenue || tData.teams[0].strStadium || 'Unknown';

        $('matchDisplay').classList.remove('hidden');
      } catch (e) {
        $('trackErr').textContent = e.message;
        $('trackErr').classList.remove('hidden');
      } finally { $('loader').classList.add('hidden'); }
    }

    $('searchBtn').onclick = searchMatch;
    $('teamInput').onkeypress = e => e.key === 'Enter' && searchMatch();
    searchMatch();
  </script>
</body>
</html>
